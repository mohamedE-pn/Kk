    function displayRandomTip() {
        const lang = document.getElementById("languageSelect").value;
        const tips = medicalTips[lang];
        const randomIndex = Math.floor(Math.random() * tips.length);
        document.getElementById("tipText").innerText = tips[randomIndex];
    }

    function normalizeText(text) {
        if (!text) return "";
        return text.toLowerCase().replace(/أ|إ|آ/g, "ا").replace(/ة/g, "ه").replace(/ى/g, "ي").replace(/ئ|ؤ/g, "ء").trim();
    }

    function searchMedicine() {
        const lang = document.getElementById("languageSelect").value;
        const query = normalizeText(document.getElementById("searchInput").value);
        const resultsDiv = document.getElementById("results");

        resultsDiv.innerHTML = "";
        if (query.length < 1) return;

        const results = medicines.filter(med => 
            normalizeText(med.name_ar).includes(query) || 
            normalizeText(med.name_en).includes(query) || 
            normalizeText(med.use_ar).includes(query)
        );

        if (results.length === 0) {
            resultsDiv.innerHTML = lang === "en" ? "<p>❌ No results found</p>" : "<p>❌ لا توجد نتائج مطابقة</p>";
            return;
        }

        results.slice(0, 50).forEach(med => {
            const card = document.createElement("div");
            card.className = "card";
            
            if (lang === "en") {
                card.innerHTML = `
                    <h3>💊 ${med.name_en}</h3>
                    <p class="use-text">✅ Use: ${med.use_en}</p>
                    <p class="warning-text">⚠️ Warning: ${med.warning_en}</p>
                    <div class="schedule-text">⏰ Timing: ${med.schedule_en}</div>
                `;
            } else {
                card.innerHTML = `
                    <h3>💊 ${med.name_ar} - ${med.name_en}</h3>
                    <p class="use-text">✅ الاستخدام: ${med.use_ar}</p>
                    <p class="warning-text">⚠️ تحذير: ${med.warning_ar}</p>
                    <div class="schedule-text">⏰ موعد الاستخدام: ${med.schedule_ar}</div>
                `;
            }
            resultsDiv.appendChild(card);
        });
    }

    function changeLanguage() {
        const lang = document.getElementById("languageSelect").value;
        const html = document.getElementById("htmlPage");
        
        if (lang === "en") {
            html.dir = "ltr";
            document.getElementById("mainHeading").innerText = "🩺 Smart Medicine Advisor";
            document.getElementById("searchInput").placeholder = "Search medicine or symptom...";
            document.getElementById("clearBtn").innerText = "🗑️ Clear Results";
            document.getElementById("disclaimer").innerText = "⚠️ Disclaimer: For educational purposes only. Consult your doctor.";
        } else {
            html.dir = "rtl";
            document.getElementById("mainHeading").innerText = "🩺 مستشارك الذكي للأدوية";
            document.getElementById("searchInput").placeholder = "اكتب اسم الدواء أو العرض...";
            document.getElementById("clearBtn").innerText = "🗑️ مسح النتائج";
            document.getElementById("disclaimer").innerText = "⚠️ تنبيه: هذه المعلومات للأغراض التعليمية فقط ولا تغني عن استشارة الطبيب.";
        }
        displayRandomTip();
        clearResults();
    }

    function clearResults() {
        document.getElementById("searchInput").value = "";
        document.getElementById("results").innerHTML = "";
    }

    window.onload = displayRandomTip;
